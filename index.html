<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bangkok Trip · 7/2–7/9</title>
<style>
  :root {
    --bg: #E8EAF6;
    --paper: #FFFFFF;
    --ink: #1A1F36;
    --sub: #6B7080;
    --muted: #A0A6B8;
    --accent: #4B5FD6;
    --accent-soft: #EEF0FB;
    --green: #1D9B6C;
    --green-soft: #E6F6F1;
    --amber: #D4820A;
    --amber-soft: #FDF3E3;
    --red: #D04040;
    --red-soft: #FDEAEA;
    --line: rgba(26,31,54,.08);
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", system-ui, "PingFang TC", sans-serif;
    --shadow-sm: 0 1px 3px rgba(26,31,54,.06), 0 4px 12px rgba(26,31,54,.06);
    --shadow: 0 2px 8px rgba(26,31,54,.08), 0 12px 32px rgba(26,31,54,.08);
  }
  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #EBEBED;
    color: var(--ink);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ── layout ── */
  .app { max-width: 430px; margin: 0 auto; min-height: 100vh; background: transparent; }

  /* ── header ── */
  .topbar {
    padding: 52px 20px 16px;
    background: transparent;
  }
  .trip-eyebrow { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: .04em; margin: 0 0 4px; text-transform: uppercase; }
  .trip-title { font-size: 32px; font-weight: 800; color: var(--ink); letter-spacing: -.03em; margin: 0 0 4px; line-height: 1.1; }
  .trip-title span { color: var(--accent); font-weight: 700; }
  .trip-sub { font-size: 13px; color: var(--sub); font-weight: 500; margin: 0; }

  /* ── person switcher ── */
  .switcher-wrap {
    padding: 0 20px 14px; background: transparent;
  }
  .switcher {
    display: flex; gap: 0;
    background: rgba(0,0,0,.06); border-radius: 12px; padding: 4px;
  }
  .swbtn {
    flex: 1; border: none; border-radius: 9px; padding: 9px 4px;
    font-family: var(--font); font-size: 14px; font-weight: 600;
    color: var(--sub); background: transparent;
    cursor: pointer; transition: all .18s ease;
  }
  .swbtn.active { background: #FFFFFF; color: var(--accent); }

  /* ── day nav ── */
  .daynav-wrap {
    background: #EBEBED;
    position: sticky; top: 0; z-index: 40;
    padding-top: 0;
  }
  .daynav {
    display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none;
    padding: 10px 20px 12px;
  }
  .daynav::-webkit-scrollbar { display: none; }
  .daypill {
    flex: 0 0 auto; display: flex; flex-direction: column; align-items: center;
    padding: 7px 12px; border-radius: 10px; border: none;
    background: transparent; cursor: pointer; transition: all .18s ease;
    font-family: var(--font);
  }
  .daypill .wd { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .04em; }
  .daypill .dd { font-size: 17px; font-weight: 700; color: var(--sub); line-height: 1.1; }
  .daypill.active { background: var(--accent); }
  .daypill.active .wd, .daypill.active .dd { color: #fff; }
  .daypill.dimday .wd, .daypill.dimday .dd { color: var(--muted); opacity: .45; }

  /* ── feed ── */
  .feed { padding: 8px 0 80px; background: #EBEBED; }

  /* ── day section ── */
  .day-section { padding: 20px 20px 4px; scroll-margin-top: 110px; }
  .day-header {
    display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px;
  }
  .day-date { font-size: 22px; font-weight: 700; color: var(--ink); letter-spacing: -.02em; }
  .day-dow { font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: .03em; text-transform: uppercase; }
  .day-hotel {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 600; color: var(--amber);
    background: var(--amber-soft); padding: 3px 9px; border-radius: 8px; margin-bottom: 12px;
  }

  /* ── stop ── */
  .timeline { position: relative; padding-left: 16px; }
  /* 連續豎線：貫穿整個 timeline */
  .timeline::before {
    content: ''; position: absolute;
    left: 33px; top: 24px; bottom: 0;
    width: 2px; background: #DDDDE2;
  }

  .stop { display: flex; gap: 0; transition: opacity .2s; position: relative; }
  .stop.dim { opacity: .18; pointer-events: none; }

  /* 左側：固定寬，dot 在時間行高度中心 */
  .stop-track {
    flex: 0 0 36px; display: flex; flex-direction: column;
    align-items: center; padding-top: 21px;
    position: relative; z-index: 1;
  }
  .stop-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #BBBBC4; flex: 0 0 8px;
  }
  .stop-dot.fly, .stop-dot.hotel, .stop-dot.food, .stop-dot.logi { background: #BBBBC4; }

  /* 右側內容 */
  .stop-content { flex: 1; padding-right: 16px; padding-bottom: 4px; }

  /* 時間行 */
  .stop-row {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 0 8px;
  }
  .stop-time {
    background: #E8E8EC; border-radius: 20px;
    padding: 4px 11px; font-size: 12px; font-weight: 600;
    color: #555; letter-spacing: -.01em; white-space: nowrap;
  }
  .stop-cat { margin-left: auto; font-size: 12px; font-weight: 600; color: #999; }

  .stop-card {
    flex: 1; background: var(--paper); border-radius: 14px;
     overflow: hidden; margin-bottom: 2px;
  }
  .stop-main { padding: 0; cursor: pointer; }
  .stop-name { padding: 0 14px 2px; font-size: 15px; font-weight: 600; color: var(--ink); line-height: 1.3; letter-spacing: -.01em; }
  .stop-area-inner { padding: 0 14px 8px; font-size: 12px; color: var(--sub); }
  .stop-name { font-size: 15px; font-weight: 600; color: var(--ink); line-height: 1.3; letter-spacing: -.01em; }
  .stop-area { font-size: 12px; color: var(--sub); margin-top: 2px; }

  .tags { display: flex; flex-wrap: wrap; gap: 5px; padding: 0 14px 10px; }
  .stop-top-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px 6px; }
  .stop-type-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .stop-chev { display:flex; align-items:center; color: var(--muted); transition: transform .22s ease; flex:0 0 auto; }
  .stop-chev.open { transform: rotate(180deg); }
  .tag {
    font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 7px;
    display: inline-flex; align-items: center; gap: 3px;
    background: #EBEBED; color: #555;
  }
  .tag.who-J, .tag.who-H, .tag.who-S { background: #EBEBED; color: #555; }

  /* detail drawer */
  .stop-detail { max-height: 0; overflow: hidden; transition: max-height .28s ease; }
  .stop-detail.open { max-height: 400px; }
  .stop-detail-inner {
    padding: 0 14px 14px; border-top: 1px solid var(--line);
    font-size: 13px; color: var(--sub); line-height: 1.6;
  }
  .stop-detail-inner p { margin: 10px 0 0; }
  .stop-detail-inner b { color: var(--ink); font-weight: 600; }
  .mapbtn {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 12px; padding: 8px 14px; border-radius: 10px;
    background: var(--accent); color: #fff;
    font-size: 13px; font-weight: 600; text-decoration: none;
  }

  /* tips panel */
  .tips-panel {
    margin: 8px 20px; background: #FFFFFF; border-radius: 14px; border: 1px solid rgba(0,0,0,.06);
    overflow: hidden;
  }
  .tips-toggle {
    display: flex; align-items: center; gap: 10px; padding: 14px 16px;
    font-size: 14px; font-weight: 600; color: var(--ink);
    cursor: pointer; border: none; background: none; width: 100%; font-family: var(--font);
    text-align: left;
  }
  .tips-toggle .chev { margin-left: auto; color: var(--muted); transition: transform .22s; }
  .tips-toggle.open .chev { transform: rotate(180deg); }
  .tips-body { max-height: 0; overflow: hidden; transition: max-height .28s ease; }
  .tips-body.open { max-height: 600px; }
  .tips-row { display: flex; gap: 10px; padding: 9px 16px; border-top: 1px solid var(--line); font-size: 13px; }
  .tips-k { flex: 0 0 70px; font-weight: 700; color: var(--accent); font-size: 12px; }
  .tips-v { color: var(--sub); }
  .tips-v b { color: var(--ink); font-weight: 600; }


  /* ── flight card ── */
  .flight-card {
    background: #FFFFFF; border-radius: 16px; overflow: hidden;
  }
  .flight-route {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px 10px; gap: 10px;
  }
  .flight-airport { text-align: center; }
  .flight-iata { font-size: 28px; font-weight: 700; color: var(--ink); letter-spacing: -.02em; line-height: 1; }
  .flight-city { font-size: 11px; color: var(--muted); margin-top: 3px; font-weight: 500; }
  .flight-line { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .flight-line hr { width: 100%; border: none; border-top: 1.5px solid #E0E0E6; margin: 0; }
  .flight-plane { font-size: 14px; }
  .flight-meta {
    display: flex; border-top: 1px solid #F0F0F4;
  }
  .flight-meta-item {
    flex: 1; padding: 10px 12px; text-align: center; border-right: 1px solid #F0F0F4;
  }
  .flight-meta-item:last-child { border-right: none; }
  .flight-meta-label { font-size: 10.5px; color: var(--muted); font-weight: 500; margin-bottom: 2px; }
  .flight-meta-value { font-size: 13px; font-weight: 700; color: var(--ink); }

  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition: none !important; } }
</style>
</head>

const WHO_COLOR = { J:'who-J', H:'who-H', S:'who-S' };
const WHO_LABEL = { J:'Jasmine', H:'Haley', S:'Shiro' };
let activeWho = null;

function hotelLine(d) {
  const h = d.hotel;
  if (!h) return '';
  let name = h.all || (activeWho === 'J' ? h.J : activeWho === 'H' ? h.H || h.HS : activeWho === 'S' ? h.S || h.HS : null);
  if (!name) {
    // Show both if no filter
    if (h.J && h.HS) name = `Tamni (J) · C'HOUSE (H&S)`;
    else if (h.JH) name = h.JH;
    else if (h.all) name = h.all;
  }
  if (!name || name === '—') return '';
  let ci = h.ci ? ` · CI ${h.ci}` : '';
  let co = h.co ? ` · CO ${h.co}` : '';
  return `<div class="day-hotel">${name}${ci}${co}</div>`;
}

function buildDays() {
  const container = document.getElementById('days-container');
  container.innerHTML = '';

  days.forEach(d => {
    const sec = document.createElement('div');
    sec.className = 'day-section';
    sec.id = 'day' + d.n;

    let stopsHtml = '<div class="timeline">';
    d.stops.forEach((s, i) => {
      const isLast = i === d.stops.length - 1;
      const dim = activeWho && !s.who.includes(activeWho) ? ' dim' : '';

      // 類型標籤排第一，人名縮寫排後
      let typeTags = s.tags.map(([cls, label]) => `<span class="tag ${cls}">${label}</span>`).join('');
      let whoTags = s.who.map(w => `<span class="tag ${WHO_COLOR[w]}">${w}</span>`).join('');
      let tagsHtml = typeTags + whoTags;

      const map = s.maps ? `<a class="mapbtn" href="${s.maps}" target="_blank" rel="noopener">地圖</a>` : '';

      let cardHtml;
      const fk = flightKey(s.name);
      if (s.k === 'fly' && fk) {
        const f = FLIGHTS[fk];
        cardHtml = `
          <div class="flight-card" onclick="toggleStop('${d.n}-${i}')">
            <div class="flight-route">
              <div class="flight-airport">
                <div class="flight-iata">${f.from}</div>
                <div class="flight-city">${f.fromCity}</div>
              </div>
              <div class="flight-line">
                <span class="flight-plane">✈️</span>
                <hr>
              </div>
              <div class="flight-airport" style="text-align:right">
                <div class="flight-iata">${f.to}</div>
                <div class="flight-city">${f.toCity}</div>
              </div>
            </div>
            <div class="flight-meta">
              <div class="flight-meta-item"><div class="flight-meta-label">Airline</div><div class="flight-meta-value">${f.airline}</div></div>
              <div class="flight-meta-item"><div class="flight-meta-label">Flight</div><div class="flight-meta-value">${f.code}</div></div>
              <div class="flight-meta-item"><div class="flight-meta-label">Passenger</div><div class="flight-meta-value">${s.who.map(w=>WHO_LABEL[w]).join(' · ')}</div></div>
            </div>
            <div class="stop-detail" id="detail-${d.n}-${i}">
              <div class="stop-detail-inner"><p>${s.note}</p></div>
            </div>
          </div>`;
      } else {
        // 類型標籤（拿掉 hotel 的 CI/CO）
        const typeTags = s.tags
          .filter(([cls,label]) => !(s.k==='hotel' && (label.includes('CI')||label.includes('CO'))))
          .map(([cls,label]) => `<span class="tag ${cls}">${label}</span>`).join('');
        const whoTagsRow = s.who.map(w=>`<span class="tag ${WHO_COLOR[w]}">${w}</span>`).join('');

        const allTags = typeTags + whoTagsRow;
        cardHtml = `
          <div class="stop-card">
            <div class="stop-main" onclick="toggleStop('${d.n}-${i}')">
              <div class="stop-top-row">
                <div class="stop-type-tags">${allTags}</div>
                <span class="stop-chev" id="chev-${d.n}-${i}"><svg viewBox="0 0 14 14" width="14" height="14"><path d="M3.5 5.25 7 8.75 10.5 5.25" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
              </div>
              <div class="stop-name" style="padding:0 14px 2px">${s.name}</div>
              <div class="stop-area" style="padding:0 14px 10px">${s.area}</div>
            </div>
            <div class="stop-detail" id="detail-${d.n}-${i}">
              <div class="stop-detail-inner"><p>${s.note}</p>${map}</div>
            </div>
          </div>`;
      }

      // 分類標籤文字（第一個 tag 的 label）
      const catLabel = s.k === 'fly' ? '航班' : s.tags.length > 0 ? s.tags[0][1] : '';

      stopsHtml += `
        <div class="stop${dim}" data-idx="${d.n}-${i}">
          <div class="stop-track">
            <div class="stop-dot ${s.k}"></div>
          </div>
          <div class="stop-content">
            <div class="stop-row">
              <div class="stop-time">${s.t}</div>
              <div class="stop-cat">${catLabel}</div>
            </div>
            ${cardHtml}
          </div>
        </div>`;
    });

    sec.innerHTML = `
      <div class="day-header">
        <div class="day-date">${d.date}</div>
        <div class="day-dow">${d.dow}</div>
      </div>
      ${hotelLine(d)}
      ${stopsHtml}`;
    container.appendChild(sec);
  });
}

function toggleStop(id) {
  const el = document.getElementById('detail-' + id);
  const chev = document.getElementById('chev-' + id);
  if (el) el.classList.toggle('open');
  if (chev) chev.classList.toggle('open');
}

function toggleTips() {
  const body = document.getElementById('tips-body');
  const toggle = document.getElementById('tips-toggle');
  body.classList.toggle('open');
  toggle.classList.toggle('open');
}

function setWho(w) {
  activeWho = (activeWho === w) ? null : w;
  document.querySelectorAll('.swbtn').forEach(b => {
    b.classList.toggle('active', b.dataset.who === activeWho);
  });
  buildDays();
  setupNav();
}

// daynav
function setupNav() {
  const nav = document.getElementById('daynav');
  nav.innerHTML = '';
  days.forEach(d => {
    const hasMe = !activeWho || d.stops.some(s => s.who.includes(activeWho));
    const btn = document.createElement('button');
    btn.className = 'daypill' + (hasMe ? '' : ' dimday');
    btn.dataset.target = 'day' + d.n;
    btn.innerHTML = `<span class="wd">${d.dow}</span><span class="dd">${d.date.replace('7/','')}</span>`;
    btn.onclick = () => document.getElementById('day' + d.n).scrollIntoView({ behavior: 'smooth', block: 'start' });
    nav.appendChild(btn);
  });

  // intersection observer for active pill
  const pills = [...nav.querySelectorAll('.daypill')];
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id;
        pills.forEach(p => p.classList.toggle('active', p.dataset.target === id));
        const ap = pills.find(p => p.dataset.target === id);
        if (ap) ap.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
      }
    });
  }, { rootMargin: '-50% 0px -47% 0px' });
  days.forEach(d => { const el = document.getElementById('day' + d.n); if (el) io.observe(el); });
}

buildDays();
setupNav();
</script>
